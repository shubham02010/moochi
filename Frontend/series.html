<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Series Details</title>
  <link rel="stylesheet" href="/assets/css/base.css">
  <link rel="stylesheet" href="/assets/css/themes.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/assets/css/home.css">
  <link rel="icon" href="/favicon.ico">
  <script type="module" src="/js/core/tailwind.config.js"></script>
  <script defer src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">

  <style>
    * {
      font-family: 'Inter', sans-serif;
    }

    .rating-badge {
      background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
      box-shadow: 0 4px 12px rgba(245, 158, 11, 0.4);
    }

    .play-btn-main {
      background: linear-gradient(135deg, var(--accent-main) 0%, var(--accent-hover) 100%);
      box-shadow: 0 8px 24px var(--accent-glow);
    }

    .play-btn-main:hover {
      box-shadow: 0 12px 32px var(--shadow-glow-strong);
      transform: translateY(-2px);
    }

    .episode-card {
      transition: all 0.3s ease;
    }

    .episode-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px var(--accent-glow);
    }

    /* Detail page hero - reduced height */
    .detail-hero {
      height: 55vh;
      min-height: 450px;
      max-height: 550px;
    }

    /* Sidebar offset for detail pages */
    .main-content-detail {
      margin-left: 72px;
    }

    @media (max-width: 768px) {
      .main-content-detail {
        margin-left: 0;
        padding-bottom: 80px;
      }
    }
  </style>
</head>

<body class="bg-bg-main text-white">

  <!-- Sidebar Navigation -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-logo">
      <a href="/" class="logo-link">
        <img src="/assets/images/logo/logo.png" alt="Moochi" class="logo-img" />
      </a>
    </div>
    <nav class="sidebar-nav">
      <a href="/" class="sidebar-item" data-tooltip="Home">
        <svg class="sidebar-icon" viewBox="0 0 24 24">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
      </a>
      <a href="/search.html" class="sidebar-item" data-tooltip="Search">
        <svg class="sidebar-icon" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
      </a>
      <a href="/profile.html" class="sidebar-item" data-tooltip="Favorites">
        <svg class="sidebar-icon" viewBox="0 0 24 24">
          <path
            d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
        </svg>
      </a>
    </nav>
    <div class="sidebar-bottom">
      <a href="/settings.html" class="sidebar-item" data-tooltip="Settings">
        <svg class="sidebar-icon" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="3" />
          <path
            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
        </svg>
      </a>
    </div>
  </aside>

  <!-- Main Content Wrapper -->
  <div class="main-content-detail">

    <!-- Header -->
    <div id="header-container"></div>

    <!-- Video Player Container (hidden by default) -->
    <div id="video-player-container" class="hidden fixed inset-0 z-[100] bg-black/90 backdrop-blur-md">
      <div class="relative w-full h-full flex items-center justify-center px-6 py-10 md:px-12 md:py-16">
        <div class="relative w-full max-w-6xl" data-player-shell>
          <div class="relative aspect-video rounded-2xl overflow-hidden bg-black shadow-2xl border border-white/10">
            <iframe id="video-player-iframe" class="w-full h-full" frameborder="0" allowfullscreen
              allow="autoplay; fullscreen; picture-in-picture"></iframe>
          </div>
          <button id="close-player"
            class="absolute -top-5 right-0 w-14 h-14 rounded-full bg-black/90 hover:bg-primary flex items-center justify-center text-white backdrop-blur-lg transition-all hover:scale-110 z-[200] shadow-2xl border-2 border-white/20">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5"
              stroke="currentColor" class="w-7 h-7">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Hero Section -->
    <div class="relative detail-hero">
      <!-- Backdrop -->
      <div id="series-backdrop" class="absolute inset-0 bg-cover bg-center" style="filter: brightness(0.3);"></div>
      <div class="absolute inset-0 bg-gradient-to-t from-black via-black/60 to-transparent"></div>
      <div class="absolute inset-0 bg-gradient-to-r from-black via-transparent to-transparent"></div>

      <!-- Content -->
      <div class="relative h-full max-w-7xl mx-auto px-6 flex items-end pb-16">
        <div class="flex gap-8 w-full">
          <!-- Poster -->
          <div class="hidden md:block w-72 flex-shrink-0">
            <img id="series-poster" class="w-full rounded-2xl shadow-2xl" alt="Series Poster">
          </div>

          <!-- Info -->
          <div class="flex-1">
            <!-- Rating Badge -->
            <div id="series-rating-badge"
              class="inline-flex items-center gap-2 rating-badge text-white px-4 py-2 rounded-full font-bold text-sm mb-4">
              <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                <path
                  d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
              </svg>
              <span id="rating-text">0.0</span>
            </div>

            <!-- Title -->
            <h1 id="series-title" class="text-4xl md:text-5xl lg:text-6xl font-black mb-5 leading-tight"
              style="text-shadow: 0 2px 8px rgba(0,0,0,0.9), 0 4px 16px rgba(0,0,0,0.7), 0 8px 32px rgba(0,0,0,0.5); letter-spacing: -0.015em; max-width: 900px;">
              Loading...</h1>

            <!-- Meta -->
            <div id="series-meta" class="flex flex-wrap items-center gap-4 text-sm font-medium text-gray-300 mb-6">
              <!-- Will be populated -->
            </div>

            <!-- Overview -->
            <p id="series-overview" class="text-lg text-gray-300 leading-relaxed mb-8 max-w-3xl line-clamp-3">Loading...
            </p>

            <!-- Buttons -->
            <div class="flex flex-wrap gap-4">
              <button id="play-season-button"
                class="play-btn-main px-10 py-4 rounded-xl font-bold text-lg flex items-center gap-3 transition-all">
                <img src="/assets/images/icons/play-button.png" alt="Play" class="w-6 h-6">
                Play Season 1
              </button>
              <button id="watch-later-btn"
                class="px-8 py-4 rounded-xl font-semibold text-base border-2 border-white/20 hover:border-primary hover:bg-primary/10 transition-all flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                Watch Later
              </button>
              <button id="watchlist-btn"
                class="px-8 py-4 rounded-xl font-semibold text-base border-2 border-white/20 hover:border-primary hover:bg-primary/10 transition-all flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z" />
                </svg>
                My List
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Seasons & Episodes Section -->
    <div class="max-w-7xl mx-auto px-6 py-12">

      <!-- Season Selector -->
      <div class="mb-8">
        <div class="flex items-center justify-between mb-6">
          <h2 class="text-3xl font-bold flex items-center gap-3">
            <div class="w-1 h-8 bg-primary rounded-full"></div>
            Episodes
          </h2>
          <div class="relative">
            <button id="season-dropdown-btn"
              class="px-6 py-3 bg-bg-card border-2 border-white/10 rounded-xl font-semibold text-base hover:border-primary transition-all flex items-center gap-3">
              <span id="season-text">Season 1</span>
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
              </svg>
            </button>
            <!-- Dropdown Menu -->
            <div id="season-dropdown-menu"
              class="hidden absolute top-full mt-2 right-0 bg-bg-elevated border border-white/10 rounded-xl shadow-2xl py-2 min-w-[200px] z-50">
              <!-- Seasons will be populated here -->
            </div>
          </div>
        </div>

        <!-- Episode Count -->
        <p id="episode-count" class="text-gray-400 text-sm font-medium mb-6">Loading episodes...</p>
      </div>

      <!-- Episodes Grid -->
      <div id="episodes-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-16">
        <!-- Episodes will be populated here -->
      </div>

      <!-- Cast Section -->
      <div class="mb-16">
        <h2 class="text-3xl font-bold mb-6 flex items-center gap-3">
          <div class="w-1 h-8 bg-primary rounded-full"></div>
          Cast & Crew
        </h2>
        <div id="cast-list" class="flex gap-4 overflow-x-auto pb-4"
          style="scrollbar-width: thin; scrollbar-color: #3b82f6 transparent;">
          <!-- Cast will be populated -->
        </div>
      </div>

      <!-- Similar Series -->
      <div>
        <h2 class="text-3xl font-bold mb-6 flex items-center gap-3">
          <div class="w-1 h-8 bg-primary rounded-full"></div>
          More Like This
        </h2>
        <div id="similar-list" class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-6 gap-4">
          <!-- Similar series will be populated -->
        </div>
      </div>

    </div>

    <!-- Server Selection Modal -->
    <div id="server-modal" class="hidden fixed inset-0 z-[9999] flex items-center justify-center p-4">
      <div class="absolute inset-0 bg-black/85 backdrop-blur-lg transition-opacity duration-300"
        data-server-modal-close>
      </div>
      <div
        class="relative w-full max-w-lg bg-bg-card rounded-2xl shadow-2xl transform transition-all duration-300 scale-95 opacity-0 border border-white/5"
        id="server-modal-content">
        <div class="px-6 pt-6 pb-4 border-b border-white/5">
          <div class="flex items-center justify-between mb-2">
            <h2 class="text-2xl font-bold text-white flex items-center gap-2">
              <svg class="w-7 h-7 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01m-7.08-7.071c3.904-3.905 10.236-3.905 14.141 0M1.394 9.393c5.857-5.857 15.355-5.857 21.213 0" />
              </svg>
              Choose Server
            </h2>
            <button data-server-modal-close
              class="w-10 h-10 rounded-full bg-white/5 hover:bg-primary/20 flex items-center justify-center transition-all hover:scale-110">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
              </svg>
            </button>
          </div>
          <p class="text-sm text-gray-400">Select the fastest streaming server</p>
        </div>
        <div id="server-list" class="px-6 py-4 max-h-[60vh] overflow-y-auto space-y-3"></div>
        <div class="px-6 py-4 border-t border-white/5 bg-black/30 rounded-b-2xl">
          <button data-server-modal-close
            class="w-full py-3 rounded-xl bg-white/5 hover:bg-white/10 text-white font-medium transition-all duration-200 hover:scale-[1.02]">Cancel</button>
        </div>
      </div>
    </div>

    <div id="footer-container"></div>

  </div><!-- End main-content-detail -->

  <!-- Mobile Bottom Navigation -->
  <nav class="mobile-nav">
    <a href="/" class="mobile-nav__item">
      <svg class="mobile-nav__icon" viewBox="0 0 24 24">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
        <polyline points="9 22 9 12 15 12 15 22" />
      </svg>
      <span>Home</span>
    </a>
    <a href="/search.html" class="mobile-nav__item">
      <svg class="mobile-nav__icon" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8" />
        <line x1="21" y1="21" x2="16.65" y2="16.65" />
      </svg>
      <span>Search</span>
    </a>
    <a href="/profile.html" class="mobile-nav__item">
      <svg class="mobile-nav__icon" viewBox="0 0 24 24">
        <path
          d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
      </svg>
      <span>Favorites</span>
    </a>
    <a href="/settings.html" class="mobile-nav__item">
      <svg class="mobile-nav__icon" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="3" />
        <path
          d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
      </svg>
      <span>Settings</span>
    </a>
  </nav>

  <script type="module" src="/js/pages/series.page.js"></script>

</body>

</html>
