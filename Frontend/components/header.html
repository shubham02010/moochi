<!-- Global Header Component -->
<header class="site-header">
  <div class="header-content">
    <!-- Logo -->
    <a href="/" class="header-logo">
      <span class="header-logo__icon">M</span>
      <span class="header-logo__text">Moochi</span>
    </a>

    <!-- Search Bar -->
    <div class="header-search">
      <svg class="header-search__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8" />
        <line x1="21" y1="21" x2="16.65" y2="16.65" />
      </svg>
      <input type="text" id="header-search-input" class="header-search__input" placeholder="Search movies, series..."
        autocomplete="off" />
      <button id="header-search-clear" class="header-search__clear" style="display: none;" aria-label="Clear search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>

      <!-- Search Results Dropdown -->
      <div id="header-search-results" class="header-search-results" style="display: none;">
        <div id="header-search-content" class="header-search-content"></div>
      </div>
    </div>

    <!-- Right Actions -->
    <div class="header-actions">
      <a href="/profile.html" class="header-action" aria-label="Profile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
      </a>
    </div>
  </div>
</header>

<style>
  .site-header {
    position: fixed;
    top: 0;
    left: 72px;
    right: 0;
    height: 64px;
    background: rgba(13, 2, 8, 0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    z-index: var(--z-header, 60);
    transition: all 0.3s ease;
  }

  .header-content {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 100%;
    padding: 0 24px;
    gap: 24px;
  }

  .header-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    flex-shrink: 0;
  }

  .header-logo__icon {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--accent-main), var(--tertiary-accent));
    border-radius: 10px;
    font-size: 1.25rem;
    font-weight: 900;
    color: white;
  }

  .header-logo__text {
    font-size: 1.25rem;
    font-weight: 800;
    color: var(--text-main);
    letter-spacing: -0.02em;
  }

  .header-search {
    position: relative;
    flex: 1;
    max-width: 480px;
  }

  .header-search__icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 20px;
    height: 20px;
    color: var(--text-muted);
    pointer-events: none;
  }

  .header-search__input {
    width: 100%;
    height: 44px;
    padding: 0 44px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text-main);
    font-size: 0.9rem;
    outline: none;
    transition: all 0.3s ease;
  }

  .header-search__input::placeholder {
    color: var(--text-muted);
  }

  .header-search__input:focus {
    border-color: var(--accent-main);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }

  .header-search__clear {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    transition: all 0.2s ease;
  }

  .header-search__clear:hover {
    background: var(--bg-elevated);
    color: var(--text-main);
  }

  .header-search__clear svg {
    width: 18px;
    height: 18px;
  }

  .header-search-results {
    position: absolute;
    top: calc(100% + 8px);
    left: 0;
    right: 0;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: var(--shadow-lg);
    max-height: 400px;
    overflow-y: auto;
    z-index: 100;
  }

  .header-search-content {
    padding: 8px;
  }

  .header-search-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 8px;
    text-decoration: none;
    color: inherit;
    transition: all 0.2s ease;
  }

  .header-search-item:hover {
    background: var(--bg-elevated);
  }

  .header-search-poster {
    width: 45px;
    height: 65px;
    border-radius: 6px;
    overflow: hidden;
    flex-shrink: 0;
    background: var(--bg-surface);
  }

  .header-search-poster img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .header-search-title {
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--text-main);
    margin: 0;
    line-height: 1.3;
  }

  .header-search-icon {
    margin-left: auto;
    font-size: 18px;
    color: var(--text-muted);
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .header-action {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 40px;
    height: 40px;
    border-radius: 10px;
    color: var(--text-muted);
    text-decoration: none;
    transition: all 0.2s ease;
  }

  .header-action:hover {
    background: var(--bg-elevated);
    color: var(--text-main);
  }

  .header-action svg {
    width: 22px;
    height: 22px;
  }

  /* Mobile Responsive */
  @media (max-width: 768px) {
    .site-header {
      left: 0;
      height: 56px;
    }

    .header-content {
      padding: 0 16px;
      gap: 12px;
    }

    .header-logo__text {
      display: none;
    }

    .header-search {
      max-width: none;
    }

    .header-search__input {
      height: 40px;
      font-size: 0.85rem;
    }
  }

  /* Spinner animation for search */
  @keyframes headerSpin {
    to {
      transform: rotate(360deg);
    }
  }
</style>
